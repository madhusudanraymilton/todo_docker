[options]

; Only expose the curated core tree and your custom addons.
; Do not add /usr/lib/python3/dist-packages/odoo/addons here.
addons_path = /mnt/core,/mnt/extra-addons
data_dir = /var/lib/odoo

server_wide_modules = base,web

; Supplied by entrypoint from ODOO_ADMIN_PASSWORD or ODOO_ADMIN_PASSWORD_FILE.
; admin_passwd =

db_host = db
db_port = 5432
db_user = odoo
db_maxconn = 8

; The entrypoint creates/uses this exact database.
list_db = False
db_name = odoo
dbfilter = ^odoo$

without_demo = True

; Direct Docker development works best with workers disabled; /websocket stays
; on the main HTTP port. In production, enable workers behind nginx/Traefik and
; route /websocket to gevent_port.
workers = 0
max_cron_threads = 1

limit_memory_soft = 805306368
limit_memory_hard = 1073741824
limit_time_cpu = 60
limit_time_real = 120
limit_request = 8192

gevent_port = 8072
http_interface = 0.0.0.0
proxy_mode = False

; Let Docker capture stdout/stderr and rotate logs via docker-compose.yml.
log_level = info
log_handler = :INFO

csv_internal_sep = ,
unaccent = False
